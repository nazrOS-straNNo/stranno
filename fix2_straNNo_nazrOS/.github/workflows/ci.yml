name: nazrOS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust CORE ──────────────────────────────────────────
  core-check:
    name: 🦀 CORE — Rust check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Кэш Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Проверка форматирования
        run: cargo fmt --manifest-path src/core/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src/core/Cargo.toml -- -D warnings

      - name: Тесты CORE
        run: cargo test --manifest-path src/core/Cargo.toml

  # ─── UI ─────────────────────────────────────────────────
  ui-check:
    name: ⚡ UI — TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Установить зависимости
        working-directory: src/ui
        run: npm ci

      - name: TypeScript проверка
        working-directory: src/ui
        run: npm run type-check

      - name: ESLint
        working-directory: src/ui
        run: npm run lint

      - name: Тесты UI
        working-directory: src/ui
        run: npm run test -- --passWithNoTests

  # ─── Безопасность ───────────────────────────────────────
  security:
    name: 🔒 Аудит безопасности
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Установить cargo-audit
        run: cargo install cargo-audit

      - name: Аудит Rust зависимостей
        run: cargo audit --manifest-path src/core/Cargo.toml
        continue-on-error: true

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Аудит npm зависимостей
        working-directory: src/ui
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Сборка Tauri ───────────────────────────────────────
  build-desktop:
    name: 🖥️ Сборка десктопного приложения
    needs: [core-check, ui-check]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Зависимости Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libssl-dev

      - name: Установить npm зависимости
        working-directory: src/ui
        run: npm ci

      - name: Сборка Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src/ui
          tauriScript: npx tauri

      - name: Загрузить артефакты
        uses: actions/upload-artifact@v4
        with:
          name: stranno-${{ matrix.os }}
          path: src/ui/src-tauri/target/release/bundle/
          retention-days: 7
          if-no-files-found: ignore
